<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <form class="loginform" id="loginform">
            <p class="title">Let’s level up your brand, together</p>

            <p class="text">You can reach us anytime via hi@untitledui.com</p>

            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name">

            <label for="email">Email</label>
            <input type="text" id="email" placeholder="you@company.com">

            <label for="phone">Phone number</label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000">

            <label for="note">How can we help?</label>
            <input type="text" placeholder="Tell us a little about project...">

            <label for="service">Service</label>
            <div class="service">
                <input type="checkbox" name="hobby" value="webdesign">Web design
                <input type="checkbox" name="hobby" value="uxdesign">UX design
                <input type="checkbox" name="hobby" value="User research">User research
                <input type="checkbox" name="hobby" value="Content creation">Content creation
                <input type="checkbox" name="hobby" value="Strategy & consulting">Strategy & consulting
            </div>
            <button id="start-btn">Get started</button>
        </form>

        <img class="img" src="/image/login.jpg">
    </div>

    <script src="/js/login.js"></script>
</body>

</html>
